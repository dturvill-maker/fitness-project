<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Workout Generator — Dylan Turville</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0c0c0c;
      --panel: #161616;
      --panel2: #1e1e1e;
      --border: rgba(255,255,255,0.08);
      --accent: #d4f54a;
      --accent-dark: #b8d93a;
      --text: #e8e8e8;
      --muted: #666;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 2.5rem;
      border-bottom: 1px solid var(--border);
    }
    .nav-logo {
      font-family: 'Space Mono', monospace;
      font-size: 0.75rem;
      letter-spacing: 3px;
      color: var(--accent);
      text-decoration: none;
    }
    .nav-links a {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.82rem;
      margin-left: 2rem;
      transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--text); }
    main {
      flex: 1;
      max-width: 780px;
      width: 100%;
      margin: 0 auto;
      padding: 4rem 1.5rem;
    }
    .page-label {
      font-family: 'Space Mono', monospace;
      font-size: 0.68rem;
      letter-spacing: 4px;
      color: var(--accent);
      text-transform: uppercase;
      display: block;
      margin-bottom: 0.75rem;
      text-align: center;
    }
    h1 {
      font-size: clamp(2.5rem, 5vw, 4rem);
      font-weight: 800;
      text-align: center;
      line-height: 1.05;
      margin-bottom: 0.5rem;
    }
    .subtitle {
      color: var(--muted);
      font-size: 0.95rem;
      text-align: center;
      margin-bottom: 3rem;
    }
    .form-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2rem;
      margin-bottom: 2rem;
    }
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.25rem;
      margin-bottom: 1.5rem;
    }
    .form-group { display: flex; flex-direction: column; gap: 0.5rem; }
    .form-group.full { grid-column: 1 / -1; }
    label {
      font-family: 'Space Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 3px;
      color: var(--muted);
      text-transform: uppercase;
    }
    select {
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.85rem 1rem;
      color: var(--text);
      font-family: 'Syne', sans-serif;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
      width: 100%;
      appearance: none;
    }
    select:focus { border-color: var(--accent); }
    select option { background: #1e1e1e; }
    .chip-group { display: flex; flex-wrap: wrap; gap: 0.5rem; }
    .chip {
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 99px;
      padding: 0.4rem 1rem;
      font-size: 0.82rem;
      cursor: pointer;
      transition: all 0.15s;
      user-select: none;
      color: var(--muted);
    }
    .chip:hover { border-color: #555; color: var(--text); }
    .chip.active {
      background: rgba(212,245,74,0.12);
      border-color: rgba(212,245,74,0.5);
      color: var(--accent);
    }
    .btn-generate {
      width: 100%;
      background: var(--accent);
      color: #111;
      border: none;
      border-radius: 12px;
      padding: 1rem;
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1rem;
      letter-spacing: 1px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }
    .btn-generate:hover { background: var(--accent-dark); }
    .btn-generate:active { transform: scale(0.98); }
    .btn-generate:disabled { opacity: 0.4; cursor: not-allowed; }
    .output-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2rem;
      display: none;
    }
    .output-card.visible { display: block; }
    .output-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
      padding-bottom: 1.25rem;
      border-bottom: 1px solid var(--border);
    }
    .output-title { font-size: 1.3rem; font-weight: 800; }
    .ai-badge {
      background: linear-gradient(90deg, rgba(212,245,74,0.15), rgba(100,200,255,0.08));
      border: 1px solid rgba(212,245,74,0.25);
      color: var(--accent);
      border-radius: 6px;
      padding: 0.25rem 0.75rem;
      font-family: 'Space Mono', monospace;
      font-size: 0.62rem;
      letter-spacing: 2px;
    }
    .ai-loading {
      display: flex;
      gap: 6px;
      align-items: center;
      justify-content: center;
      padding: 2.5rem 0;
    }
    .ai-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 1.2s ease-in-out infinite;
    }
    .ai-dot:nth-child(2) { animation-delay: 0.2s; }
    .ai-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes pulse { 0%,80%,100%{opacity:.2;transform:scale(0.8)} 40%{opacity:1;transform:scale(1)} }
    .exercise-list { display: flex; flex-direction: column; gap: 0.75rem; margin-bottom: 1.5rem; }
    .exercise-item {
      background: var(--panel2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1rem 1.25rem;
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 1rem;
    }
    .ex-num {
      font-family: 'Space Mono', monospace;
      font-size: 0.7rem;
      color: var(--muted);
      min-width: 20px;
    }
    .ex-name { font-weight: 700; font-size: 0.95rem; }
    .ex-sub { font-size: 0.78rem; color: var(--muted); margin-top: 0.2rem; }
    .ex-sets {
      font-family: 'Space Mono', monospace;
      font-size: 0.78rem;
      color: var(--accent);
      white-space: nowrap;
      text-align: right;
    }
    .tips-section {
      background: rgba(212,245,74,0.05);
      border: 1px solid rgba(212,245,74,0.15);
      border-radius: 12px;
      padding: 1.25rem;
      margin-bottom: 1.5rem;
    }
    .tips-label {
      font-family: 'Space Mono', monospace;
      font-size: 0.62rem;
      letter-spacing: 3px;
      color: var(--accent);
      margin-bottom: 0.75rem;
    }
    .tips-text { font-size: 0.88rem; line-height: 1.7; color: #bbb; }
    .btn-reset {
      width: 100%;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 10px;
      padding: 0.75rem;
      font-family: 'Syne', sans-serif;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-reset:hover { border-color: #555; color: var(--text); }
    footer {
      text-align: center;
      padding: 2rem;
      border-top: 1px solid var(--border);
      font-family: 'Space Mono', monospace;
      font-size: 0.7rem;
      color: var(--muted);
    }
    footer a { color: #555; text-decoration: none; margin: 0 0.75rem; }
    footer a:hover { color: var(--accent); }
    @media (max-width: 600px) {
      .form-grid { grid-template-columns: 1fr; }
      nav { padding: 1rem; flex-direction: column; gap: 0.75rem; }
      .nav-links a { margin-left: 1rem; }
    }
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">← BACK TO MAIN</a>
  <div class="nav-links">
    <a href="scratch.html">Fitness Page</a>
    <a href="index.html#resume">Resume</a>
  </div>
</nav>

<main>
  <span class="page-label">Mini App — Built with AI</span>
  <h1>Workout<br>Generator</h1>
  <p class="subtitle">Tell me your goals and I'll build your workout.</p>

  <div class="form-card">
    <div class="form-grid">

      <div class="form-group">
        <label>Muscle Group / Focus</label>
        <select id="muscle">
          <option value="">Select focus...</option>
          <option value="chest">Chest</option>
          <option value="back">Back</option>
          <option value="legs">Legs</option>
          <option value="shoulders">Shoulders</option>
          <option value="arms">Arms (Biceps & Triceps)</option>
          <option value="core">Core / Abs</option>
          <option value="full body">Full Body</option>
          <option value="push">Push (Chest, Shoulders, Triceps)</option>
          <option value="pull">Pull (Back, Biceps)</option>
        </select>
      </div>

      <div class="form-group">
        <label>Goal</label>
        <select id="goal">
          <option value="">Select goal...</option>
          <option value="hypertrophy (muscle growth)" selected>Hypertrophy (Muscle Growth)</option>
          <option value="strength">Strength</option>
          <option value="endurance">Endurance</option>
          <option value="fat loss">Fat Loss</option>
          <option value="general fitness">General Fitness</option>
        </select>
      </div>

      <div class="form-group">
        <label>Experience Level</label>
        <select id="level">
          <option value="">Select level...</option>
          <option value="beginner">Beginner</option>
          <option value="intermediate" selected>Intermediate</option>
          <option value="advanced">Advanced</option>
        </select>
      </div>

      <div class="form-group">
        <label>Available Time</label>
        <select id="time">
          <option value="">Select time...</option>
          <option value="30 minutes">30 Minutes</option>
          <option value="45 minutes">45 Minutes</option>
          <option value="60 minutes" selected>60 Minutes</option>
          <option value="75+ minutes">75+ Minutes</option>
        </select>
      </div>

      <div class="form-group full">
        <label>Equipment Available</label>
        <div class="chip-group" id="equipment-chips">
          <span class="chip active" data-val="barbell">Barbell</span>
          <span class="chip active" data-val="dumbbells">Dumbbells</span>
          <span class="chip active" data-val="cables">Cables</span>
          <span class="chip active" data-val="machines">Machines</span>
          <span class="chip" data-val="resistance bands">Bands</span>
          <span class="chip" data-val="pull-up bar">Pull-up Bar</span>
          <span class="chip" data-val="bodyweight only">Bodyweight Only</span>
        </div>
      </div>

    </div>

    <button class="btn-generate" id="gen-btn" onclick="generateWorkout()">GENERATE WORKOUT</button>
  </div>

  <div class="output-card" id="output-card">
    <div class="output-header">
      <span class="output-title" id="output-title">Your Workout</span>
      <span class="ai-badge">CLAUDE AI</span>
    </div>
    <div id="output-body">
      <div class="ai-loading">
        <div class="ai-dot"></div><div class="ai-dot"></div><div class="ai-dot"></div>
      </div>
    </div>
    <button class="btn-reset" onclick="resetForm()">↺ Generate Another</button>
  </div>
</main>

<footer>
  <a href="index.html">Main Site</a>
  <a href="scratch.html">Fitness Page</a>
  <span>Built with Claude AI · Web Dev Project · Dylan Turville</span>
</footer>

<script>
  document.querySelectorAll('.chip').forEach(chip => {
    chip.addEventListener('click', () => chip.classList.toggle('active'));
  });

  function getSelectedEquipment() {
    return [...document.querySelectorAll('.chip.active')]
      .map(c => c.dataset.val).join(', ') || 'bodyweight only';
  }
async function generateWorkout() {
  const muscle = document.getElementById('muscle').value;
  const goal = document.getElementById('goal').value;
  const level = document.getElementById('level').value;
  const time = document.getElementById('time').value;

  if (!muscle || !goal || !level || !time) {
    alert('Please fill out all fields before generating.');
    return;
  }

  const card = document.getElementById('output-card');
  const body = document.getElementById('output-body');
  const btn = document.getElementById('gen-btn');

  card.classList.add('visible');
  btn.disabled = true;
  body.innerHTML = `<div class="ai-loading"><div class="ai-dot"></div><div class="ai-dot"></div><div class="ai-dot"></div></div>`;
  card.scrollIntoView({ behavior: 'smooth', block: 'start' });

  // Simulate a 1.5 second delay to mimic an AI response
  setTimeout(() => {
    const parsed = {
      "exercises": [
        { "name": "Barbell Bench Press", "sets": "4", "reps": "8", "rest": "90s", "notes": "Keep shoulder blades tucked." },
        { "name": "Incline Dumbbell Fly", "sets": "3", "reps": "12", "rest": "60s", "notes": "Control the stretch at bottom." },
        { "name": "Pushups", "sets": "3", "reps": "Failure", "rest": "45s", "notes": "Maintain a rigid core." }
      ],
      "tips": "Focus on the mind-muscle connection. Ensure you are hitting the full range of motion for maximum hypertrophy."
    };

    let html = `<div class="exercise-list">`;
    parsed.exercises.forEach((ex, i) => {
      const num = i + 1 < 10 ? `0${i+1}` : `${i+1}`;
      html += `<div class="exercise-item">
        <span class="ex-num">${num}</span>
        <div>
          <div class="ex-name">${ex.name}</div>
          <div class="ex-sub">${ex.notes} · Rest ${ex.rest}</div>
        </div>
        <div class="ex-sets">${ex.sets} × ${ex.reps}</div>
      </div>`;
    });
    html += `</div>`;

    if (parsed.tips) {
      html += `<div class="tips-section">
        <div class="tips-label">COACH'S TIPS</div>
        <div class="tips-text">${parsed.tips}</div>
      </div>`;
    }
    body.innerHTML = html;
    btn.disabled = false;
  }, 1500);
}
</script>
</body>
</html>
